<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impartire Nota</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 1.2rem; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item.selected { background-color: #e2f0d9; text-decoration: line-through; opacity: 0.6; }
        .total { font-size: 1.2rem; font-weight: bold; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Adaugă Produs</h2>
    <input type="text" id="itemName" placeholder="Nume produs (ex: Pizza)">
    <input type="number" id="itemPrice" placeholder="Preț (RON)">
    <button onclick="addItem()">Adaugă pe Bon</button>
</div>

<div class="card">
    <h2>Produse Notă</h2>
    <div id="itemList"></div>
    <div class="total" id="totalDisplay">Total: 0 RON</div>
</div>

<script>
    let items = [];

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        if (!name || isNaN(price)) return;

        items.push({ id: Date.now(), name, price, taken: false });
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        render();
    }

    function toggleItem(id) {
        items = items.map(item => item.id === id ? { ...item, taken: !item.taken } : item);
        render();
    }

    function render() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        let total = 0;

        items.forEach(item => {
            if (!item.taken) total += item.price;
            const div = document.createElement('div');
            div.className = `item ${item.taken ? 'selected' : ''}`;
            div.onclick = () => toggleItem(item.id);
            div.innerHTML = `<span>${item.name}</span> <strong>${item.price.toFixed(2)} RON</strong>`;
            list.appendChild(div);
        });

        document.getElementById('totalDisplay').innerText = `Rest de plată: ${total.toFixed(2)} RON`;
    }
</script>
</body>
</html>
