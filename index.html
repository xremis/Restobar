<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Împărțire Bon Restaurant</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 12px; background: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); margin-bottom: 12px; }
        h2 { margin-top: 0; font-size: 1.1rem; color: #333; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 0.95rem; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #aaa; }
        .btn-secondary { background: #6c757d; margin-top: 5px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; margin-top: 5px; border-radius: 6px; cursor: pointer; background: #fafafa; }
        .item.selected { background-color: #d4edda; text-decoration: line-through; color: #155724; border-left: 4px solid #28a745; }
        .total { font-size: 1.2rem; font-weight: bold; text-align: right; margin-top: 15px; color: #111; }
        #loading { display: none; color: #007bff; font-weight: bold; margin-top: 10px; text-align: center; }
        .row { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. Configurare Cheie API</h2>
    <input type="password" id="apiKey" placeholder="Lipește cheia ta Gemini API aici">
</div>

<div class="card">
    <h2>2. Adaugă Bon</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button id="scanBtn" onclick="processReceipt()">Scanează Poza cu AI</button>
    <div id="loading">Se analizează bonul... te rugăm să aștepți.</div>
</div>

<div class="card">
    <h2>Adaugă Produs Manual</h2>
    <div class="row">
        <input type="text" id="manualName" placeholder="Nume produs">
        <input type="number" id="manualPrice" placeholder="Preț" style="width: 40%;">
    </div>
    <button class="btn-secondary" onclick="addManualItem()">+ Adaugă pe Bon</button>
</div>

<div class="card">
    <h2>3. Produse (Apasă pe ce ai consumat)</h2>
    <div id="itemList"></div>
    <div class="total" id="totalDisplay">Rest de plată: 0.00 RON</div>
</div>

<script>
    let items = [];

    async function processReceipt() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const fileInput = document.getElementById('imageInput');
        const loading = document.getElementById('loading');
        const scanBtn = document.getElementById('scanBtn');

        if (!apiKey) {
            alert('Te rog introdu mai întâi cheia API!');
            return;
        }
        if (!fileInput.files[0]) {
            alert('Alege o poză cu bonul!');
            return;
        }

        const file = fileInput.files[0];
        const base64Data = await toBase64(file);

        loading.style.display = 'block';
        scanBtn.disabled = true;

        const promptText = `Analizează bonul fiscal din imagine și extrage produsele și prețurile totale corespunzătoare.
Răspunde STRICT sub forma unui array JSON valid, fără marcaje markdown, fără alt text în jur, ex:
[{"name": "Produs 1", "price": 25.0}, {"name": "Produs 2", "price": 12.5}]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: promptText },
                            { inline_data: { mime_type: file.type, data: base64Data.split(',')[1] } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                alert(`Eroare API (${data.error.code}): ${data.error.message}`);
                return;
            }

            const rawText = data.candidates[0].content.parts[0].text;
            const cleanJson = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
            const parsedItems = JSON.parse(cleanJson);

            items = parsedItems.map((item, index) => ({
                id: Date.now() + index,
                name: item.name,
                price: parseFloat(item.price),
                taken: false
            }));

            render();
        } catch (err) {
            alert('Eroare la procesare: ' + err.message);
        } finally {
            loading.style.display = 'none';
            scanBtn.disabled = false;
        }
    }

    function addManualItem() {
        const nameInput = document.getElementById('manualName');
        const priceInput = document.getElementById('manualPrice');
        const name = nameInput.value.trim();
        const price = parseFloat(priceInput.value);

        if (!name || isNaN(price)) {
            alert('Introdu un nume și un preț valid!');
            return;
        }

        items.push({
            id: Date.now(),
            name: name,
            price: price,
            taken: false
        });

        nameInput.value = '';
        priceInput.value = '';
        render();
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function toggleItem(id) {
        items = items.map(item => item.id === id ? { ...item, taken: !item.taken } : item);
        render();
    }

    function render() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        let remainingTotal = 0;

        if (items.length === 0) {
            list.innerHTML = '<div style="color: #777; text-align: center; padding: 10px;">Niciun produs adăugat.</div>';
        }

        items.forEach(item => {
            if (!item.taken) remainingTotal += item.price;
            const div = document.createElement('div');
            div.className = `item ${item.taken ? 'selected' : ''}`;
            div.onclick = () => toggleItem(item.id);
            div.innerHTML = `<span>${item.name}</span> <strong>${item.price.toFixed(2)} RON</strong>`;
            list.appendChild(div);
        });

        document.getElementById('totalDisplay').innerText = `Rest de plată: ${remainingTotal.toFixed(2)} RON`;
    }

    render();
</script>
</body>
</html>
