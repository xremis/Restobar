<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impartire Nota</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 1.1rem; }
        input, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #aaa; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; margin-top: 5px; border-radius: 5px; cursor: pointer; }
        .item.selected { background-color: #d4edda; text-decoration: line-through; color: #155724; }
        .total { font-size: 1.2rem; font-weight: bold; text-align: right; margin-top: 15px; }
        #loading { display: none; color: #007bff; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. Configurare API Key</h2>
    <input type="password" id="apiKey" placeholder="Introdu cheia ta Gemini API">
</div>

<div class="card">
    <h2>2. Incarcă Poza cu Bonul</h2>
    <input type="file" id="imageInput" accept="image/*">
    <button id="scanBtn" onclick="processReceipt()">Scanează Bonul cu AI</button>
    <div id="loading">Se procesează bonul... așteaptă câteva secunde.</div>
</div>

<div class="card">
    <h2>3. Produse pe Bon (Apasă pe ce ai consumat)</h2>
    <div id="itemList"></div>
    <div class="total" id="totalDisplay">Rest de plată: 0.00 RON</div>
</div>

<script>
    let items = [];

    async function processReceipt() {
        const apiKey = document.getElementById('apiKey').value;
        const fileInput = document.getElementById('imageInput');
        const loading = document.getElementById('loading');
        const scanBtn = document.getElementById('scanBtn');

        if (!apiKey) {
            alert('Te rog introdu cheia API!');
            return;
        }
        if (!fileInput.files[0]) {
            alert('Te rog alege o poză cu bonul!');
            return;
        }

        const file = fileInput.files[0];
        const base64Data = await toBase64(file);

        loading.style.display = 'block';
        scanBtn.disabled = true;

        const promptText = `Analizează această poză cu un bon fiscal de restaurant. Extrage toate produsele și prețurile lor totale. Formatul răspunsului TREBUIE să fie strict un JSON de tip listă de obiecte, fără alt text în jur, astfel:
[
  {"name": "Nume produs", "price": 25.0},
  {"name": "Nume produs 2", "price": 10.5}
]
Dacă sunt mai multe bucăți din același produs pe un singur rând (ex: 3 Bere), calculează prețul total pentru acea linie sau pune-le separat. Răspunde DOAR cu JSON-ul.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: promptText },
                            { inline_data: { mime_type: file.type, data: base64Data.split(',')[1] } }
                        ]
                    }]
                })
            });

            const data = await response.json();
            const textResponse = data.candidates[0].content.parts[0].text;
            
            // Curățare JSON din răspuns
            const cleanJson = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
            const parsedItems = JSON.parse(cleanJson);

            items = parsedItems.map((item, index) => ({
                id: index,
                name: item.name,
                price: parseFloat(item.price),
                taken: false
            }));

            render();
        } catch (err) {
            alert('Eroare la citirea bonului. Verifică cheia API sau calitatea pozei.');
            console.error(err);
        } finally {
            loading.style.display = 'none';
            scanBtn.disabled = false;
        }
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function toggleItem(id) {
        items = items.map(item => item.id === id ? { ...item, taken: !item.taken } : item);
        render();
    }

    function render() {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        let remainingTotal = 0;

        items.forEach(item => {
            if (!item.taken) remainingTotal += item.price;
            const div = document.createElement('div');
            div.className = `item ${item.taken ? 'selected' : ''}`;
            div.onclick = () => toggleItem(item.id);
            div.innerHTML = `<span>${item.name}</span> <strong>${item.price.toFixed(2)} RON</strong>`;
            list.appendChild(div);
        });

        document.getElementById('totalDisplay').innerText = `Rest de plată: ${remainingTotal.toFixed(2)} RON`;
    }
</script>
</body>
</html>
